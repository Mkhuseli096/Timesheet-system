<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Projectized Timesheet</title>
  <style>
    body {
      background: black;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      color: black;
    }

    h1 {
      color: red;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background-color: red;
      color: white;
      border: none;
      padding: 12px 20px;
      margin-top: 10px;
      cursor: pointer;
      width: 100%;
      border-radius: 5px;
      font-size: 1rem;
    }

    button:hover {
      background-color: darkred;
    }

    .link {
      margin-top: 10px;
      display: block;
      color: red;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h1>Login</h1>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log In</button>
  </form>

  <a class="link" href="index.html">Back to Home</a>
</div>

<script src="login.js"></script>

</body>
</html>
